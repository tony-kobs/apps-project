<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookmark Saver</title>
    <script type="module" crossorigin src="/apps-project/1-bookmark-saver.js"></script>
    <link rel="modulepreload" crossorigin href="/apps-project/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="/apps-project/assets/vendor-CdosXiC5.js">
    <link rel="stylesheet" crossorigin href="/apps-project/assets/vendor-7o4lOLNu.css">
    <link rel="stylesheet" crossorigin href="/apps-project/assets/1-bookmark-saver-BBcHn3me.css">
    <link rel="stylesheet" crossorigin href="/apps-project/assets/styles-BHk6uSq_.css">
  </head>
  <body>
    <a class="back-link" href="./index.html">Go back</a>
    <main class="bookmark-main">
      <div class="bookmark-wrapper">
        <h1 class="bookmark-title">Bookmark Saver</h1>

        <div class="bookmark-input-wrapper">
          <div class="bookmark-add-wrap">
            <input
              class="bookmark-input"
              type="text"
              id="bookmark-name"
              placeholder="Bookmark Name"
            />
            <input
              class="bookmark-input"
              type="url"
              id="bookmark-url"
              placeholder="Bookmark URL"
            />
            <button class="bookmark-btn" id="add-bookmark">Add Bookmark</button>
          </div>
          <div class="bookmark-search-wrapper">
            <input
              class="bookmark-input bookmark-search-input"
              type="text"
              id="bookmark-search"
              placeholder="Search bookmarks..."
            />
          </div>
        </div>

        <div class="bookmark-import-export">
          <button class="bookmark-action-btn" id="export-json">
            Export JSON
          </button>

          <label class="bookmark-action-btn bookmark-file-btn">
            Import JSON
            <input id="import-json" type="file" accept=".json" hidden />
          </label>

          <label class="bookmark-action-btn bookmark-file-btn">
            Import Chrome
            <input id="import-chrome" type="file" accept=".html,.htm" hidden />
          </label>
        </div>

        <div class="bookmark-folders-panel">
          <div class="bookmark-folder-create">
            <input
              class="bookmark-input bookmark-folder-input"
              type="text"
              id="folder-name"
              placeholder="Folder name"
            />
            <button class="bookmark-action-btn" id="create-folder">
              Create Folder
            </button>
          </div>

          <div class="bookmark-folders-wrapper" id="bookmark-folders"></div>
        </div>

        <div class="bookmark-list-wrapper">
          <ul id="bookmark-list"></ul>
        </div>
      </div>
    </main>
  </body>
</html>
