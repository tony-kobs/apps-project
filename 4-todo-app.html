<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDo app</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" crossorigin href="/apps-project/assets/4-todo-app-COTs0SDT.css">
    <link rel="stylesheet" crossorigin href="/apps-project/assets/styles-DiYVYxal.css">
  </head>
  <body>
    <a class="back-link" href="./index.html">Go back</a>
    <main>
      <div class="app">
        <div class="head-todo-app">
          <h1>
            <i class="fas fa-check-circle"></i>
            My Tasks
          </h1>
          <p id="date"></p>
        </div>
        <!--  -->
        <div class="todo-input">
          <input
            type="text"
            id="task-input"
            placeholder="What do you need to do?"
          />
          <button id="add-task">
            <i class="fas fa-plus"></i>
          </button>
        </div>
        <!--  -->
        <div class="filters">
          <span class="filter active" data-filter="all"> All </span>
          <span class="filter" data-filter="active"> Active </span>
          <span class="filter" data-filter="completed"> Completed </span>
        </div>
        <!--  -->
        <div class="todos-container">
          <ul id="todos-list">
            <!-- li will be inserted right here -->
          </ul>
          <div class="empty-state hidden">
            <i class="fas fa-clipboard-list"></i>
            <p>No tasks here yet</p>
          </div>
        </div>
        <!--  -->
        <div class="foot-todo-app">
          <p id="items-left">0 items left</p>
          <button id="clear-completed">Clear completed</button>
        </div>
      </div>
    </main>

    <script src="./js/4-todo-app.js"></script>
  </body>
</html>
