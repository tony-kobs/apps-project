      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" crossorigin href="/apps-project/assets/4-todo-app-Bn0JmazR.css">
    <link rel="stylesheet" crossorigin href="/apps-project/assets/styles-C_3iLXuk.css">
  </head>
  <body>
    <header class="header">
      <nav class="nav">
        <!-- <a class="nav-logo" href="./index.html" aria-label="Site logo">
            <svg class="nav-logo-icon" width="100" height="30">
              <use href="{=$icon-path}"></use>
            </svg>
          </a> -->
        <ul class="nav-list">
          <li class="nav-item">
            <a class="nav-link {=$highlight-act}" href="./1-bookmark-saver.html"
              >Bookmark Saver</a
            >
          </li>
          <li class="nav-item">
            <a
              class="nav-link {=$highlight-curr}"
              href="./2-color-generation.html"
              >Color Palette Generator</a
            >
          </li>
          <li class="nav-item">
            <a
              class="nav-link {=$highlight-curr}"
              href="./3-expense-tracker.html"
              >Expense tracker</a
            >
          </li>
          <li class="nav-item">
            <a
              class="nav-link {=$highlight-curr}"
              href="./5-pass-generator.html"
              >Password Generator</a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link {=$highlight-curr}" href="./6-kanban-board.html"
              >Kanban Board</a

          </li>
          <li class="nav-item">
            <a
              class="nav-link {=$highlight-curr}"

          </li>
          <li class="nav-item">
            <a class="nav-link" href="./index.html">Go back</a>
          </li>
        </ul>
      </nav>
    </header>

    <div class="app">
      <div class="head-todo-app">
        <h1>
          <i class="fas fa-check-circle"></i>
          My Tasks
        </h1>
        <p id="date"></p>
      </div>
      <!--  -->
      <div class="todo-input">
        <input
          type="text"
          id="task-input"
          placeholder="What do you need to do?"
        />
        <button id="add-task">
          <i class="fas fa-plus"></i>
        </button>
      </div>
      <!--  -->
      <div class="filters">
        <span class="filter active" data-filter="all"> All </span>
        <span class="filter" data-filter="active"> Active </span>
        <span class="filter" data-filter="completed"> Completed </span>
      </div>
      <!--  -->
      <div class="todos-container">
        <ul id="todos-list">
          <!-- li will be inserted right here -->
        </ul>
        <div class="empty-state hidden">
          <i class="fas fa-clipboard-list"></i>
          <p>No tasks here yet</p>
        </div>
      </div>
      <!--  -->
      <div class="foot-todo-app">
        <p id="items-left">0 items left</p>
        <button id="clear-completed">Clear completed</button>
      </div>
    </div>

    <script src="./js/4-todo-app.js"></script>
  </body>
</html>
