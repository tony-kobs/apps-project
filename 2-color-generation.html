    <main>
      <div class="container color-generate-wrapper">
        <h1 class="color-generate-title">Color Palette Generator</h1>
        <button id="generate-btn">
          <i class="fas fa-sync-alt"></i>
          Generate Palette
        </button>

        <div class="palette-container">
          <!-- COLOR BOX 1 -->
          <div class="color-box">
            <div class="color" style="background-color: #e1f5fe"></div>
            <div class="color-info">
              <span class="hex-value">#E1F5FE</span>
              <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
            </div>
          </div>
          <!-- COLOR BOX 2 -->
          <div class="color-box">
            <div class="color" style="background-color: #b3e5fc"></div>

          </div>
