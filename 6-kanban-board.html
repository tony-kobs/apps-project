<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Board</title>
    <script type="module" crossorigin src="/apps-project/6-kanban-board.js"></script>
    <link rel="modulepreload" crossorigin href="/apps-project/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="stylesheet" crossorigin href="/apps-project/assets/6-kanban-board-DhEgE5bR.css">
    <link rel="stylesheet" crossorigin href="/apps-project/assets/styles-DiYVYxal.css">
  </head>
  <body>
    <a class="back-link" href="./index.html">Go back</a>
    <main>
      <div class="kanban-wrapper">
        <h1 class="kanban-title">Simple Kanban Board</h1>

        <div class="board">
          <!-- LIST 1 -->
          <div class="list" id="list1">
            <h2>To Do</h2>
            <div class="card" draggable="true" id="card1">Wash dishes</div>
            <div class="card" draggable="true" id="card2">Buy Groceries</div>
          </div>
          <!-- LIST 2 -->
          <div class="list" id="list2">
            <h2>In Progress</h2>
            <div class="card" draggable="true" id="card3">Learn to code</div>
          </div>
          <!-- LIST 3 -->
          <div class="list" id="list3">
            <h2>Done</h2>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
