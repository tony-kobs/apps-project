<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Validator</title>
    <script type="module" crossorigin src="/apps-project/7-validation-form.js"></script>
    <link rel="modulepreload" crossorigin href="/apps-project/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="stylesheet" crossorigin href="/apps-project/assets/7-validation-form-Bmd19l4M.css">
    <link rel="stylesheet" crossorigin href="/apps-project/assets/styles-Bkp5-2of.css">
  </head>
  <body>
    <a class="back-link" href="./index.html">Go back</a>
    <main>
      <div class="registration-wrapper">
        <form id="registration-form">
          <h1 class="register-title">Register</h1>
          <!-- Username -->
          <div class="form-group">
            <label for="username">Username</label>
            <input id="username" type="text" placeholder="Enter username" />
            <small></small>
          </div>
          <!-- Email -->
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Enter email" />
            <small></small>
          </div>
          <!-- Password -->
          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter password" />
            <small></small>
          </div>
          <!-- confirm password -->
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input
              id="confirmPassword"
              type="password"
              placeholder="Confirm Password"
            />
            <small></small>
          </div>
          <!-- submit button -->
          <button type="submit">Register</button>
        </form>
      </div>
    </main>
  </body>
</html>
