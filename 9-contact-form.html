<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Form</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script type="module" crossorigin src="/apps-project/assets/modulepreload-polyfill-B5Qt9EMX.js"></script>
    <link rel="stylesheet" crossorigin href="/apps-project/assets/9-contact-form-US0k_krm.css">
    <link rel="stylesheet" crossorigin href="/apps-project/assets/styles-BmnIkk_R.css">
  </head>
  <body>
    <a class="back-link" href="./index.html">Go back</a>
    <main>
      <div class="container-wrapper">
        <div class="form-container">
          <h1 class="contact-form-title">Get in Touch</h1>
          <p class="info-text">Fill out the form below to contact us</p>

          <form>
            <div class="input-group">
              <div class="input-field">
                <i class="fas fa-user"></i>
                <input type="text" placeholder="Your Name" required />
              </div>

              <div class="input-field">
                <i class="fas fa-envelope"></i>
                <input type="email" placeholder="Your Email" required />
              </div>

              <div class="input-field">
                <i class="fas fa-phone"></i>
                <input type="tel" placeholder="Phone (optional)" />
              </div>

              <div class="input-field">
                <i class="fas fa-tag"></i>
                <input type="text" placeholder="Subject" required />
              </div>
            </div>

            <div class="message-field">
              <i class="fas fa-message"></i>
              <textarea placeholder="Your Message" required></textarea>
            </div>
            <button type="submit">
              <div class="btn-content">
                <span>Send Message</span>
                <i class="fas fa-paper-plane"></i>
              </div>
            </button>
          </form>

          <div class="contact-info">
            <div class="info-item">
              <i class="fas fa-map-marker-alt"></i>
              <span>123 Main St, Anytown, USA</span>
            </div>
            <div class="info-item">
              <i class="fas fa-envelope"></i>
              <span>contact@example.com</span>
            </div>
            <div class="info-item">
              <i class="fas fa-phone"></i>
              <span>+1 (555) 123-4567</span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
