  </head>
  <body class="expense-tracker">
    <header class="header">
        <nav class="nav">
          <!-- <a class="nav-logo" href="./index.html" aria-label="Site logo">
            <svg class="nav-logo-icon" width="100" height="30">

          <ul class="nav-list">

              <a
                class="nav-link {=$highlight-act}"

            <li class="nav-item">

              <a class="nav-link" href="./index.html">Go back</a>
            </li>
          </ul>
        </nav>
    </header>
    <main>
      <div class="expense-wrapper">
        <h1 class="expense-title">Expense Tracker</h1>

        <div class="balance-container">
          <h2 class="title-balance">Your Balance</h2>
          <p class="balance" id="balance">$0.00</p>
          <!--  -->
          <div class="summary">
            <div class="income">
              <h3>Income</h3>
              <p id="income-amount">$0.00</p>
            </div>
            <!--  -->
            <div class="expenses">
              <h3>Expenses</h3>
              <p id="expense-amount">$0.00</p>
            </div>
          </div>
        </div>
        <!--  -->
        <div class="main-content">
          <div class="transaction-container">
            <h2>Transactions</h2>
            <ul id="transaction-list">
              <!-- Transactions will be inserted here -->
            </ul>
          </div>
          <!--  -->
          <div class="form-container">
            <h2>Add Transaction</h2>
            <form id="transaction-form">
              <div class="form-group">
                <label class="expense-label" for="description"
                  >Description</label
                >
                <input
                  class="expense-input"
                  type="text"
                  id="description"
                  placeholder="Enter description..."
                  required
                />
              </div>
              <div class="form-group">
                <label class="expense-label" for="amount">Amount</label>
                <input
                  class="expense-input"
                  type="number"
                  id="amount"
                  placeholder="Enter amount..."
                  required
                />
                <small class="expense-neg">Use negative (-) for expenses</small>
              </div>
              <button class="expense-btn-add" type="submit">
                Add Transaction
              </button>
            </form>
          </div>
        </div>
      </div>
      <!-- Loads the specified .html file -->
    </main>
  </body>
</html>
